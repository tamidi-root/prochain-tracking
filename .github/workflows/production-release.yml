name: production-release

on:
  workflow_run:
    workflows:
      - production-build
    types:
      - completed
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Build workflow run id to deploy. Required for manual runs.
        required: true
        type: string

permissions:
  actions: read

jobs:
  deploy:
    uses: ./.github/workflows/_deploy.yml
    with:
      environment_name: production
      artifact_name: production-build-tracking-web
      s3_bucket: production-prochain
      s3_prefix: www/tracking-web
      source_run_id: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || inputs.source_run_id }}
    secrets: inherit
